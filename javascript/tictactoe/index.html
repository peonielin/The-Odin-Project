<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../tictactoe/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="game-container">
      <h1>Let's play Tic Tac Toe</h1>
      <div class="gameboard">
        <div class="box" id="0"></div>
        <div class="box" id="1"></div>
        <div class="box" id="2"></div>
        <div class="box" id="3"></div>
        <div class="box" id="4"></div>
        <div class="box" id="5"></div>
        <div class="box" id="6"></div>
        <div class="box" id="7"></div>
        <div class="box" id="8"></div>
      </div>
      <h2 class="status-message"></h2>
      <div class="names">
        <input
          type="text"
          class="playerOneName"
          placeholder="Player One Name"
        />
        <input
          type="text"
          class="playerTwoName"
          placeholder="Player Two Name"
        />
        <button type="submit" class="submit">Submit</button>
      </div>

      <button type="reset" class="reset">Reset</button>
    </div>

    <script src="../tictactoe/script.js"></script>
  </body>
</html>
