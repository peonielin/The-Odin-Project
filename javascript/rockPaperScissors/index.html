<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button>Rock</button>
    <button>Paper</button>
    <button>Scissors</button>
    <div id="container"></div>

    <script>
      const results = document.querySelector("#container");

      const buttons = document.querySelectorAll("button");

      function onClick(event) {
        const humanSelection = event.target.textContent;
        const computerSelection = getComputerChoice();
        playRound(humanSelection, computerSelection, results);
        if (humanScore == 5) {
          const outcome = document.createElement("p");
          outcome.textContent = "You beat the computer";
          results.appendChild(outcome);
          buttons.forEach((button) => {
            button.disabled = true;
          });
        } else if (computerScore == 5) {
          const outcome = document.createElement("p");
          outcome.textContent = "You lost to the computer";
          results.appendChild(outcome);
          buttons.forEach((button) => {
            button.disabled = true;
          });
        }
      }

      buttons.forEach((button) => {
        button.addEventListener("click", onClick);
      });

      function getComputerChoice() {
        let choice = Math.floor(Math.random() * 3);

        if (choice == 0) {
          return "rock";
        } else if (choice == 1) {
          return "paper";
        } else if (choice == 2) {
          return "scissors";
        }
      }
      let humanScore = 0;
      let computerScore = 0;

      function playRound(human, computer, results) {
        const result = document.createElement("p");
        human = human.toLowerCase();
        if (human == computer) {
          result.textContent =
            "tie i guess " + " Score is " + humanScore + " to " + computerScore;
        } else if (human == "rock" && computer == "paper") {
          computerScore++;
          result.textContent =
            "You lose! Paper beats Rock" +
            " Score is " +
            humanScore +
            " to " +
            computerScore;
        } else if (human == "rock" && computer == "scissors") {
          humanScore++;
          result.textContent =
            "You win! Rock beats Scissors" +
            " Score is " +
            humanScore +
            " to " +
            computerScore;
        } else if (human == "paper" && computer == "rock") {
          humanScore++;
          result.textContent =
            "You win! Paper beats Rock" +
            " Score is " +
            humanScore +
            " to " +
            computerScore;
        } else if (human == "paper" && computer == "scissors") {
          result.textContent =
            "You lose! Scissors beats Paper" +
            " Score is " +
            humanScore +
            " to " +
            computerScore;
          computerScore++;
        } else if (human == "scissors" && computer == "rock") {
          result.textContent =
            "You lose! Rock beats Scissors " +
            " Score is " +
            humanScore +
            " to " +
            computerScore;
          computerScore++;
        } else if (human == "scissors" && computer == "paper") {
          humanScore++;
          result.textContent =
            "You lose! Rock beats Scissors" +
            " Score is " +
            humanScore +
            " to" +
            computerScore;
        }
        results.appendChild(result);
        return;
      }
    </script>
  </body>
</html>
